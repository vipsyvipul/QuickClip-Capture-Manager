<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!--
    QuickClip Capture — Obsidian plugin icon
    Designed for Obsidian's 0 0 100 100 viewBox.
    Follows Lucide guidelines: 2px stroke (scaled), round caps/joins, currentColor.

    Shape: bag body + left-offset arch handle (matches brand QC-Icon.png) + clip tab on right.
    In Obsidian context stroke="currentColor" inherits theme text color.
  -->
  <!-- Bag body -->
  <rect x="6" y="32" width="88" height="58" rx="8"
        fill="none" stroke="#1e1e1e" stroke-width="8"
        stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Handle arch — centered, sides tapered inward -->
  <path d="M 32 32 L 36 20 Q 36 12 43 12 L 57 12 Q 64 12 64 20 L 68 32"
        fill="none" stroke="#1e1e1e" stroke-width="8"
        stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Clip bar — thinner, rounded left cap, extends to right edge -->
  <path d="M 94 44 L 56 44 Q 50 44 50 51 Q 50 58 56 58 L 94 58"
        fill="none" stroke="#1e1e1e" stroke-width="5"
        stroke-linecap="round" stroke-linejoin="round"/>
</svg>
